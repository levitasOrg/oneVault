name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Decode debug keystore
        # Only debug.keystore.base64 is committed. On Linux `base64 -d` is fine
        # (the python decode is a macOS-only workaround).
        run: base64 -d debug.keystore.base64 > debug.keystore
      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --no-configuration-cache --no-daemon
      - name: Assemble debug APK
        # Separate invocation: assembleDebug rejects --tests, and AGP 9.1.1
        # needs --no-configuration-cache here.
        run: ./gradlew :app:assembleDebug --no-configuration-cache --no-daemon
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: onevault-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: ignore
